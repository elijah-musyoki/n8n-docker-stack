volumes:
  db_storage:
  n8n_storage:
  redis_storage:

x-shared: &shared
  restart: always
  image: docker.n8n.io/n8nio/n8n:${N8N_VERSION}
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
    - QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD=10000
    - QUEUE_HEALTH_CHECK_ACTIVE=true
    - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY}
    - N8N_RUNNERS_ENABLED=true
    - N8N_RUNNERS_MODE=external
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
    - N8N_RUNNERS_BROKER_PORT=5679
    - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
    - N8N_NATIVE_PYTHON_RUNNER=true
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    - N8N_LOG_FORMAT=json
    - N8N_LOG_OUTPUT=console
    - N8N_LOG_LEVEL=info
    - N8N_METRICS=true
    - N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL=true
    - N8N_METRICS_INCLUDE_NODE_TYPE_LABEL=true
    - N8N_METRICS_INCLUDE_QUEUE_METRICS=true
    - N8N_OTEL_ENABLED=true
    - N8N_OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4318
    - N8N_OTEL_TRACES_SAMPLE_RATE=0.1
    - N8N_DEFAULT_BINARY_DATA_MODE=database
    - N8N_BINARY_DATA_DATABASE_MAX_FILE_SIZE=512
    - N8N_BLOCK_ENV_ACCESS_IN_NODE=true
    - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n
    - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_GIT_NODE_DISABLE_BARE_REPOS=true
    - N8N_PUSH_BACKEND=websocket
    - N8N_GRACEFUL_SHUTDOWN_TIMEOUT=30
    - EXECUTIONS_DATA_PRUNE=true
    - EXECUTIONS_DATA_MAX_AGE=720
    - EXECUTIONS_DATA_PRUNE_MAX_COUNT=50000
  volumes:
    - n8n_storage:/home/node/.n8n
  extra_hosts:
    - host.docker.internal:host-gateway
  networks:
    - n8n-net

x-backend-deps: &backend-deps
  redis:
    condition: service_healthy
  postgres:
    condition: service_healthy

x-runner: &runner
  restart: always
  image: n8nio/runners:${N8N_VERSION}
  environment:
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
  networks:
    - n8n-net

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    restart: always
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
    volumes:
      - db_storage:/var/lib/postgresql
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - n8n-net

  redis:
    image: redis:${REDIS_VERSION}
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_storage:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "${REDIS_PASSWORD}" ping']
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - n8n-net

  n8n:
    <<: *shared
    ports:
      - 127.0.0.1:5678:5678
    depends_on:
      <<: *backend-deps
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  n8n-runner:
    <<: *runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    depends_on:
      n8n:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"net\").createConnection(5680).on(\"connect\",()=>process.exit(0)).on(\"error\",()=>process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  n8n-worker:
    <<: *shared
    command: worker --concurrency=5
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5678/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      <<: *backend-deps
      n8n:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  n8n-worker-runner:
    <<: *runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-worker:5679
    depends_on:
      n8n-worker:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"net\").createConnection(5680).on(\"connect\",()=>process.exit(0)).on(\"error\",()=>process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  n8n-net:
    driver: bridge
